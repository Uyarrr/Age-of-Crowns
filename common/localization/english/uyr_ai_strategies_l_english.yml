l_english:
 ai_strategy_england_unite_britain: "Unification of Britain"
 ai_strategy_england_unite_britain_desc: "[COUNTRY.GetName] wants to bring the British Isles under its control by subjugating Scotland and consolidating control over Ireland."

 ai_strategy_ottoman_imperial_expansion: "Sublime Porte Dominance"
 ai_strategy_ottoman_imperial_expansion_desc: "[COUNTRY.GetName] wants to expand its authority across Anatolia, the Balkans, and the Middle East through conquest and subjugation."

 ai_strategy_modernization: "State Modernization"
 ai_strategy_modernization_desc: "[COUNTRY.GetName] wants to modernize its laws and institutions, replacing outdated systems with more advanced ones."

 ai_strategy_hre_imperial_hegemony: "Imperial Hegemony"
 ai_strategy_hre_imperial_hegemony_desc: "[COUNTRY.GetName] wants to maintain cohesion within the Holy Roman Empire and assert its authority over Central Europe."

 ai_strategy_france_royal_centralization: "Valois Ascendancy"
 ai_strategy_france_royal_centralization_desc: "[COUNTRY.GetName] strives to strengthen the crown by integrating its vassals, expelling foreign powers from its territory, and establishing itself as the dominant force in Western Europe."

 ai_strategy_timurid_imperial_conquest: "Timurid Imperial Ambition"
 ai_strategy_timurid_imperial_conquest_desc: "[COUNTRY.GetName] seeks to expand through relentless conquest, exploiting weakness along its frontiers and subjugating neighboring powers to restore and extend its imperial legacy."

 ai_strategy_horde_frontier_expansion: "Frontier Horde Expansion"
 ai_strategy_horde_frontier_expansion_desc: "[COUNTRY.GetName] seeks to dominate its frontier through rapid conquest, opportunistic warfare, and the subjugation of weaker neighboring states."

 ai_strategy_dynamic_opportunism: "Dynamic Opportunism"
 ai_strategy_dynamic_opportunism_desc: "[COUNTRY.GetName] seeks to secure itself through diplomacy, alliances, and defensive agreements, while exploiting opportunities to conquer or subjugate weaker neighbors when circumstances are favorable."