l_english:

 ### ERA 1 ###

 legalism:0 "Legalism"
 legalism_desc:0 "The codification of law strengthens state authority and reinforces the ruler's right to govern. A more formal legal order improves administrative discipline and central control over society."

 abacus:0 "Abacus"
 abacus_desc:0 "The widespread use of counting tools improves record-keeping, taxation, and commerce. Even simple mathematical instruments can greatly enhance the efficiency of state finances."

 imperial_ambitions:0 "Imperial Ambitions"
 imperial_ambitions_desc:0 "A state driven by conquest and prestige seeks to expand its influence beyond its traditional borders. Grand ambitions increase diplomatic confidence and strengthen the image of imperial authority."

 province_governors:0 "Provincial Governors"
 province_governors_desc:0 "Delegating authority to regional governors allows rulers to better manage distant lands. Provincial administration improves local integration and extends state control across wider territories."

 construction:0 "Construction"
 construction_desc:0 "The organized planning of labor and materials allows states to undertake larger building projects. Construction knowledge lays the groundwork for infrastructure, public works, and urban development."

 roads_and_waystones:0 "Roads and Waystones"
 roads_and_waystones_desc:0 "Marked roads, milestones, and maintained routes improve communication and movement across the realm. Better overland travel supports trade, administration, and military logistics."

 urbanization:0 "Urbanization"
 urbanization_desc:0 "As towns grow into centers of production and exchange, they reshape the economic and social fabric of the state. Urbanization supports infrastructure growth, administration, and expanding construction capacity."

 national_guard:0 "National Guard"
 national_guard_desc:0 "Local militias and civic defense forces provide rulers with a dependable means of preserving order. A national guard strengthens internal security while deepening the link between state and society."

 classic_scholasticism:0 "Classical Scholasticism"
 classic_scholasticism_desc:0 "The disciplined study of theology, philosophy, and logic sustains learned traditions within religious and academic institutions. Scholastic thought improves education while making organized schooling more efficient."

 trading:0 "Trading"
 trading_desc:0 "The formal exchange of goods between regions encourages specialization and wealth creation. Organized trade networks support merchants, markets, and the early growth of commercial institutions."

 international_relations:0 "International Relations"
 international_relations_desc:0 "The art of diplomacy allows rulers to secure alliances, manage rivalries, and pursue strategic interests abroad. More refined foreign relations strengthen a state's position among its peers."

 trade_fairs:0 "Trade Fairs"
 trade_fairs_desc:0 "Periodic great markets draw merchants from distant lands to exchange goods, information, and credit. Trade fairs strengthen commercial ties and improve regional trading power."

 merchant_guilds:0 "Merchant Guilds"
 merchant_guilds_desc:0 "Associations of merchants regulate commerce, defend privileges, and organize trade activity. Guild structures improve the reliability and capacity of long-distance exchange."

 master_masons:0 "Master Masons"
 master_masons_desc:0 "Highly trained builders and stoneworkers bring greater skill and precision to major projects. Their expertise improves construction capacity and enables more ambitious works."

 expanded_archives:0 "Expanded Archives"
 expanded_archives_desc:0 "The preservation of records, decrees, and accounts strengthens state memory and administrative continuity. Larger archives improve diplomatic coordination and the reach of government."

 organized_religion:0 "Organized Religion"
 organized_religion_desc:0 "A structured religious hierarchy provides spiritual legitimacy, social cohesion, and administrative influence. Organized religion can strengthen the authority of both temple and state."

 alchemy:0 "Alchemy"
 alchemy_desc:0 "Though rooted in mysticism, alchemical practice encourages experimentation with substances, medicines, and preservation. These studies can improve public resilience against disease and hardship."

 international_trade:0 "International Trade"
 international_trade_desc:0 "Trade conducted across seas and frontiers binds distant economies together. Expanding international exchange increases the scale of commerce and broadens access to foreign markets."

 academia:0 "Academia"
 academia_desc:0 "A scholarly community dedicated to debate, learning, and preservation of knowledge forms the basis of higher education. Academia strengthens literacy and encourages more advanced intellectual life."

 empiricism:0 "Empiricism"
 empiricism_desc:0 "Knowledge grounded in observation and practical experience challenges inherited assumptions. Empirical thought strengthens administration, diplomacy, and the spread of useful education."

 ### ERA 2 ###

 renaissance:0 "Renaissance"
 renaissance_desc:0 "A revival of classical learning, artistic achievement, and intellectual curiosity transforms elite culture and statecraft. The Renaissance raises prestige and encourages a more educated society."

 tenant_farmers:0 "Tenant Farmers"
 tenant_farmers_desc:0 "Replacing older labor obligations with tenancy arrangements gives cultivators greater economic incentives while preserving elite landholding. Tenant farming can loosen rigid rural structures and support gradual social change."

 favorable_social_mobility:0 "Favorable Social Mobility"
 favorable_social_mobility_desc:0 "A society that allows talent and ambition to overcome birth can more easily cultivate skilled administrators, artisans, and professionals. Greater mobility improves the supply of qualified people."

 university:0 "University"
 university_desc:0 "Institutions of higher learning gather scholars, train officials, and preserve advanced knowledge. Universities form the intellectual backbone of administration, law, and scientific inquiry."

 institutions:0 "Institutions"
 institutions_desc:0 "The strengthening of formal civic and academic institutions gives the state more tools to shape society. Better institutions improve the reach and effectiveness of public education."

 patron_of_arts:0 "Patron of the Arts"
 patron_of_arts_desc:0 "Rulers and nobles who sponsor painters, poets, and architects turn artistic achievement into prestige and influence. Patronage enriches cultural life and strengthens elite legitimacy."

 renaissance_sculptures:0 "Renaissance Sculpture"
 renaissance_sculptures_desc:0 "The flourishing of monumental sculpture and decorative stonework reflects both artistic refinement and civic ambition. Demand for such works stimulates quarrying and urban beautification."

 landed_voting:0 "Landed Voting"
 landed_voting_desc:0 "Political participation restricted to property holders preserves the dominance of traditional elites while widening formal governance beyond the ruler alone. It is a controlled step toward representative rule."

 local_police_force:0 "Local Police Force"
 local_police_force_desc:0 "Structured local policing improves order in towns and provinces without requiring a fully centralized security apparatus. Local forces help rulers maintain peace and enforce the law."

 renaissance_construction:0 "Renaissance Construction"
 renaissance_construction_desc:0 "Improved design, planning, and engineering methods allow for more ambitious public works and urban projects. These advances expand the scale and pace of construction."

 gravel_road:0 "Gravel Roads"
 gravel_road_desc:0 "Roads surfaced with gravel are more durable and reliable than dirt tracks, especially in wet conditions. Better roads improve transport while reducing the disruption caused by floods and mud."

 banking:0 "Banking"
 banking_desc:0 "The growth of lending houses and financial intermediaries transforms the management of money. Banking supports trade, lowers borrowing costs, and strengthens commercial exchange."

 standardized_coins:0 "Standardized Coinage"
 standardized_coins_desc:0 "Reliable weights, measures, and minting standards increase confidence in currency. Standardized coinage improves taxation, trade, and the circulation of wealth."

 double_entry_bookkeeping:0 "Double-Entry Bookkeeping"
 double_entry_bookkeeping_desc:0 "A more systematic method of recording credits and debits greatly improves financial clarity. Better accounting strengthens merchants, states, and complex enterprises alike."

 tech_bureaucracy:0 "Bureaucracy"
 tech_bureaucracy_desc:0 "An organized administrative class allows rulers to govern more effectively through records, offices, and procedure. Bureaucracy expands the capacity of the state to tax, police, and regulate."

 land_based_taxation:0 "Land-Based Taxation"
 land_based_taxation_desc:0 "Taxing land and its output provides rulers with a predictable source of revenue rooted in agrarian society. This system strengthens fiscal control over the countryside."

 guilds:0 "Guilds"
 guilds_desc:0 "Urban craft and merchant guilds regulate production, uphold standards, and defend privileges. Their influence helps organize economic life and creates a framework for chartered enterprise."

 guild_charters:0 "Guild Charters"
 guild_charters_desc:0 "Formal charters grant corporations and associations legal standing, rights, and protections. These privileges encourage organized commerce and strengthen urban economic institutions."

 psychiatry:0 "Psychiatry"
 psychiatry_desc:0 "Early efforts to understand the mind as a subject of systematic study reshape how states and intellectuals think about behavior. Though still limited, such inquiry refines administration and public thought."

 nationalism:0 "Nationalism"
 nationalism_desc:0 "The idea that people sharing language, history, and culture should form a political community transforms modern politics. Nationalism strengthens political mobilization and central authority."

 labor_movement:0 "Labor Movement"
 labor_movement_desc:0 "As workers organize to defend their interests, they become a growing force in public life. Labor movements push for protections, representation, and a broader social role for the state."

 ### ERA 3 ###

 new_world:0 "New World"
 new_world_desc:0 "Awareness of lands across the ocean expands the horizons of trade, settlement, and imperial ambition. The discovery of new continents reshapes global politics and resource competition."

 colonization:0 "Colonization"
 colonization_desc:0 "The organized settlement and domination of overseas territories opens new opportunities for extraction, prestige, and migration. Colonization becomes a defining feature of expanding empires."

 colonial_charters:0 "Colonial Charters"
 colonial_charters_desc:0 "Chartered rights allow states and privileged companies to organize settlement and govern overseas domains. These arrangements strengthen colonial administration and imperial expansion."

 exploration_canada:0 "Exploration of Canada"
 exploration_canada_desc:0 "Northern forests, river systems, and coastal routes offer new opportunities for trade and settlement. Exploration of Canada lowers the cost of extending colonial administration there."

 colonial_east_canada:0 "Colonial East Canada"
 colonial_east_canada_desc:0 "Permanent footholds in eastern Canada transform remote claims into active colonial possessions. Settlement, trade posts, and local administration anchor imperial presence in the region."

 exploration_caribbean:0 "Exploration of the Caribbean"
 exploration_caribbean_desc:0 "The islands of the Caribbean offer valuable harbors, plantation land, and strategic sea lanes. Exploration opens the way for profitable colonies and stronger maritime influence."

 colonial_caribbean:0 "Colonial Caribbean"
 colonial_caribbean_desc:0 "Establishing plantations, ports, and permanent settlements in the Caribbean turns exploration into durable imperial control. The region becomes central to wealth and naval strategy."

 exploration_north_america:0 "Exploration of North America"
 exploration_north_america_desc:0 "The mapping of coastlines, river valleys, and interior lands enables future settlement and trade. Exploration of North America strengthens imperial interest in the continent."

 colonial_east_north_america:0 "Colonial East North America"
 colonial_east_north_america_desc:0 "Founding stable colonies along the eastern seaboard creates lasting political and economic footholds. These settlements become centers of trade, migration, and imperial rivalry."

 exploration_east_mexico:0 "Exploration of Eastern Mexico"
 exploration_east_mexico_desc:0 "Surveying the coasts and interior routes of eastern Mexico expands access to fertile land and valuable trade corridors. Exploration paves the way for further colonization."

 colonization_east_mexico:0 "Colonization of Eastern Mexico"
 colonization_east_mexico_desc:0 "Permanent settlement and political control in eastern Mexico bring new territory into the imperial sphere. Colonization secures resources, labor, and strategic depth."

 exploration_central_america:0 "Exploration of Central America"
 exploration_central_america_desc:0 "Dense forests, mountain routes, and narrow coasts make Central America a challenging but rewarding region to explore. Knowledge of the region supports later colonial expansion."

 colonial_central_america:0 "Colonial Central America"
 colonial_central_america_desc:0 "Organized settlement in Central America allows empires to secure key trade routes and productive lands. Colonial administration ties the region more closely to overseas rule."

 exploration_south_america:0 "Exploration of South America"
 exploration_south_america_desc:0 "The vast rivers, coasts, and highlands of South America offer immense opportunity for conquest and settlement. Exploration opens new frontiers for imperial ambition."

 colonial_east_south_america:0 "Colonial East South America"
 colonial_east_south_america_desc:0 "Settlements along the eastern coast of South America create stable bases for inland expansion and overseas trade. Colonial rule takes root through ports, plantations, and frontier communities."

 civilizing_mission:0 "Civilizing Mission"
 civilizing_mission_desc:0 "Imperial powers increasingly justify overseas domination as a moral duty to reform and govern other peoples. This ideology strengthens colonial administration and broadens foreign ambitions."

 socialism:0 "Socialism"
 socialism_desc:0 "Critics of industrial and social inequality propose a new order based on collective welfare, worker power, and social responsibility. Socialist thought expands the role of state protection and reform."

 corporatism:0 "Corporatism"
 corporatism_desc:0 "Society is envisioned as a hierarchy of organized groups working together under state guidance rather than in open conflict. Corporatism seeks order, stability, and controlled social cooperation."

 pan-nationalism:0 "Pan-Nationalism"
 pan-nationalism_desc:0 "The belief that related peoples should unite within a single political community drives ambitious projects of national consolidation. Pan-nationalism strengthens authority and fuels large unification movements."

 mutual_funds:0 "Mutual Funds"
 mutual_funds_desc:0 "Pooling capital from many investors allows wealth to be mobilized on a larger scale. Mutual funds support broader participation in finance while improving credit and investment capacity."

 investment_banks:0 "Investment Banks"
 investment_banks_desc:0 "Financial institutions dedicated to large-scale lending, underwriting, and enterprise finance accelerate economic concentration. Investment banks connect private capital to national development."

 philosophical_pragmatism:0 "Philosophical Pragmatism"
 philosophical_pragmatism_desc:0 "Ideas are increasingly judged by their practical consequences rather than abstract purity. Pragmatic thought encourages flexible governance, administrative efficiency, and results-oriented policy."

 identification_documents:0 "Identification Documents"
 identification_documents_desc:0 "The formal registration of individuals through papers and records strengthens the state's ability to monitor movement, taxation, and legal status. Identification systems deepen administrative reach."

 ### ERA 4 ###

 malaria_prevention:0 "Malaria Prevention"
 malaria_prevention_desc:0 "Greater understanding of tropical disease and measures to limit its spread make colonial expansion less deadly. Malaria prevention improves both public health and overseas administration."

 central_planning:0 "Central Planning"
 central_planning_desc:0 "Economic coordination directed by the state promises greater control over resources, investment, and production. Central planning strengthens the administrative hand of government in economic life."

 political_agitation:0 "Political Agitation"
 political_agitation_desc:0 "Mass politics gives reformers, radicals, and organized activists new ways to challenge existing power. Political agitation increases participation in public life while also unsettling old hierarchies."

 international_exchange_standards:0 "International Exchange Standards"
 international_exchange_standards_desc:0 "Shared rules, norms, and financial conventions reduce friction in international trade and finance. Greater standardization helps integrate markets across borders."

 corporate_management:0 "Corporate Management"
 corporate_management_desc:0 "As enterprises grow larger, new methods of hierarchy, supervision, and planning become necessary. Corporate management improves the efficiency and coordination of large economic organizations."

 psychoanalysis:0 "Psychoanalysis"
 psychoanalysis_desc:0 "The belief that hidden motives and unconscious drives shape human behavior opens a new field of intellectual inquiry. These ideas influence administration, culture, and elite understandings of society."

 ### ERA 5 ###

 mass_surveillance:0 "Mass Surveillance"
 mass_surveillance_desc:0 "Modern states increasingly seek to monitor populations through records, reporting, and systematic observation. Mass surveillance strengthens internal control and resistance to separatist pressures."

 modern_financial_instruments:0 "Modern Financial Instruments"
 modern_financial_instruments_desc:0 "Complex credit systems, securities, and new investment tools allow wealth to move more efficiently through the economy. These instruments deepen financial markets and strengthen state finance."

 ### ERA 6 ###

 rationalism:0 "Rationalism"
 rationalism_desc:0 "Confidence in reason as the foundation of knowledge encourages more secular, systematic approaches to education and governance. Rationalist thought strengthens schools and reshapes intellectual life."

 democracy:0 "Democracy"
 democracy_desc:0 "The principle that political authority should rest on the will of the people transforms the legitimacy of government. Democratic ideals expand expectations of participation, reform, and social responsibility."

 romanticism:0 "Romanticism"
 romanticism_desc:0 "A cultural movement celebrating emotion, tradition, and the spirit of the nation reshapes art, literature, and politics. Romanticism enhances prestige and deepens the symbolic power of culture."

 centralization:0 "Centralization"
 centralization_desc:0 "Bringing authority, taxation, and administration more directly under the state reduces the autonomy of local powers. Centralization strengthens incorporation, internal security, and fiscal capacity."

 stock_exchange:0 "Stock Exchange"
 stock_exchange_desc:0 "A formal marketplace for shares and securities concentrates capital and channels investment into expanding enterprise. Stock exchanges deepen financial integration and market sophistication."

 medical_degrees:0 "Medical Degrees"
 medical_degrees_desc:0 "The professionalization of medicine through formal training and certification improves the quality of care. Licensed physicians strengthen public health institutions and medical authority."

 egalitarianism:0 "Egalitarianism"
 egalitarianism_desc:0 "The belief that all people deserve broader political and social equality challenges entrenched hierarchy. Egalitarian thought strengthens welfare ambitions and raises expectations of reform."

 pharmaceuticals:0 "Pharmaceuticals"
 pharmaceuticals_desc:0 "The systematic production of medicinal compounds improves treatment and disease management on a larger scale. Pharmaceuticals strengthen public health and reduce the toll of epidemics."

 modern_sewerage:0 "Modern Sewerage"
 modern_sewerage_desc:0 "Underground drainage and waste removal systems greatly improve urban sanitation. Modern sewerage reduces disease, supports larger cities, and strengthens public infrastructure."

 quinine:0 "Quinine"
 quinine_desc:0 "The medicinal use of quinine offers an effective defense against malaria, making previously deadly regions more accessible. Its adoption improves health while enabling deeper colonial expansion."

 central_archives:0 "Central Archives"
 central_archives_desc:0 "A centralized system of records allows the modern state to catalog property, people, and administration with greater precision. Central archives enhance taxation, incorporation, and internal control."

 central_banking:0 "Central Banking"
 central_banking_desc:0 "A central monetary authority stabilizes credit, currency, and state finance. Central banking strengthens minting, lowers borrowing costs, and supports a more integrated national economy."

 joint_stock_companies:0 "Joint-Stock Companies"
 joint_stock_companies_desc:0 "By dividing ownership into shares, enterprises can gather capital on a scale impossible for most individuals alone. Joint-stock companies accelerate expansion, speculation, and industrial concentration."

 realism:0 "Realism"
 realism_desc:0 "A cultural turn toward the faithful depiction of everyday life reflects a more analytical and modern social outlook. Realism enhances prestige by aligning art with contemporary experience."

 postal_savings:0 "Postal Savings"
 postal_savings_desc:0 "Savings systems managed through the postal network bring financial services to broader layers of society. Postal savings encourage thrift, mobilize capital, and strengthen household participation in finance."

 behaviorism:0 "Behaviorism"
 behaviorism_desc:0 "The study of human behavior through observable patterns rather than inner speculation reflects an increasingly scientific view of society. Behaviorism supports more systematic governance and social analysis."