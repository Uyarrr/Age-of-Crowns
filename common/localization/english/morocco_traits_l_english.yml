l_english:
 morocco_trait_1: "Powerful Viziers" 
 morocco_trait_2: "Sufi Marabouts" 
 morocco_trait_3: "Trans-Saharan Trade" 
 morocco_trait_4: "Power of Islam" 
 morocco_trait_5: "Maghrebi Pirates" 
 morocco_trait_6: "Desert Warfare"

 morocco_trait_1_desc: "The authority of the Sultan is reinforced by powerful viziers, whose administrative skill and political influence ensure stability and effective governance across the realm."
 morocco_trait_2_desc: "Sufi marabouts and religious scholars play a central role in society, spreading knowledge, guiding communities, and fostering intellectual and spiritual development."
 morocco_trait_3_desc: "Control over trans-Saharan trade routes allows Morocco to channel wealth, goods, and influence between sub-Saharan Africa and the Mediterranean world."
 morocco_trait_4_desc: "Islam serves as a unifying force within the realm, strengthening religious authority and enabling the spread of faith across diverse populations."
 morocco_trait_5_desc: "Corsairs and privateers operating from Moroccan ports project naval power and disrupt rival trade, bringing both wealth and influence to the Sultanate."
 morocco_trait_6_desc: "Experienced in harsh environments, Moroccan forces excel in desert and difficult terrain, maintaining discipline and resilience under adverse battlefield conditions."