l_english:
 HOLY_ROMAN_EMPIRE: "Holy Roman Empire"
 identity_holy_roman_empire: "Holy Roman Empire"
 identity_holy_roman_empire_desc: "A loose confederation of kingdoms, duchies, and free cities in Central Europe, bound together under the authority of an elected Emperor. While its unity is fragile and its members fiercely independent, the Empire endures as a political and cultural force, balancing tradition, diplomacy, and power."

 JAPANESE_SHOGUNATE: "Japanese Shogunate"
 identity_japanese_shogunate: "Japanese Shogunate"
 identity_japanese_shogunate_desc: "A decentralized military government headed by the Shogun, whose authority rests upon the loyalty of the daimyo. While the great clans formally serve the realm, rivalries and competing ambitions threaten to fracture the country. Only a strong leader can preserve order and unite Japan under a single banner."