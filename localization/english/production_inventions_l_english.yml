l_english:

 ### ERA 1 ###

 agriculture:0 "Agriculture"
 agriculture_desc:0 "The organized cultivation of crops forms the foundation of all settled societies. Expanding farmland and improving basic techniques allows populations to grow and sustain more complex economies."

 quarrying:0 "Quarrying"
 quarrying_desc:0 "The extraction of stone from quarries provides essential materials for construction, fortifications, and infrastructure. Organized quarrying enables larger and more durable building projects."

 metallurgy:0 "Metallurgy"
 metallurgy_desc:0 "The refinement and shaping of metals allow for the production of tools, weapons, and basic machinery. Metallurgy marks a key step toward more advanced production and economic specialization."

 mining_laws:0 "Mining Laws"
 mining_laws_desc:0 "The regulation of mineral extraction ensures that valuable resources are properly managed and taxed. Formal mining laws increase state control over production and resource exploitation."

 bronze_working:0 "Bronze Working"
 bronze_working_desc:0 "The use of copper and its alloys expands the range of tools and weapons available to society. Bronze working enables early industrial development and improves craftsmanship."

 iron_working:0 "Iron Working"
 iron_working_desc:0 "The mastery of iron production greatly increases the durability and efficiency of tools and weapons. Iron becomes the backbone of expanding agricultural and industrial output."

 windmill:0 "Windmills"
 windmill_desc:0 "Harnessing wind power to grind grain and process materials increases agricultural efficiency. Windmills reduce manual labor and improve food production across rural regions."

 serfs:0 "Serfdom"
 serfs_desc:0 "Binding peasants to the land ensures a stable and controlled agricultural workforce. While limiting personal freedom, serfdom increases consistent food production and rural stability."

 fine_metals_mining:0 "Precious Metal Mining"
 fine_metals_mining_desc:0 "The extraction of gold, silver, and sulfur provides valuable resources for trade, currency, and advanced production. These materials become vital for both economic and military development."

 woodcutting:0 "Woodcutting"
 woodcutting_desc:0 "The organized harvesting of timber supplies construction, fuel, and early industry. Logging operations become essential for expanding settlements and production chains."

 glassworks:0 "Glassworks"
 glassworks_desc:0 "The production of glass enables new forms of craftsmanship, from containers to windows. Glassworks support both urban development and luxury industries."

 furniture_workshop:0 "Furniture Workshops"
 furniture_workshop_desc:0 "Specialized workshops produce refined wooden goods for domestic and commercial use. Furniture production reflects growing urban demand and skilled labor specialization."

 cloth_workshop:0 "Cloth Workshops"
 cloth_workshop_desc:0 "The organized production of textiles transforms raw fibers into usable fabrics. Cloth workshops form the backbone of early manufacturing and trade."

 papermill:0 "Paper Mills"
 papermill_desc:0 "The production of paper supports administration, literacy, and record keeping. Paper mills are essential for bureaucratic expansion and cultural development."

 fishing:0 "Fishing Industry"
 fishing_desc:0 "The systematic harvesting of fish provides a reliable food source and supports coastal economies. Fishing becomes a key supplement to agriculture in sustaining populations."

 sheep_ranching:0 "Sheep Ranching"
 sheep_ranching_desc:0 "The breeding of sheep provides wool for textile production. Ranching integrates agriculture and industry, supporting growing demand for fabrics."

 tannery:0 "Tanneries"
 tannery_desc:0 "The processing of hides into leather enables the production of durable goods such as clothing, armor, and tools. Tanneries are vital for both civilian and military supply."

 pottery:0 "Pottery"
 pottery_desc:0 "The crafting of ceramic goods provides essential containers for storage and transport. Pottery supports both domestic life and commercial distribution."

 brewery:0 "Brewing"
 brewery_desc:0 "The production of beer and other fermented drinks supports urban populations and improves food preservation. Brewing becomes an important part of both economy and daily life."

 ### ERA 2 ###

 workshop_standardization:0 "Workshop Standardization"
 workshop_standardization_desc:0 "The standardization of tools and production methods increases efficiency across industries. Organized workshops allow for greater scaling of economic output."

 fiber_paper:0 "Fiber Paper Production"
 fiber_paper_desc:0 "The use of plant fibers in papermaking improves both quality and output. This advancement supports expanding literacy, administration, and knowledge exchange."

 expanded_quarrying:0 "Expanded Quarrying"
 expanded_quarrying_desc:0 "Improved techniques and organization increase the output of stone quarries. Greater production supports large-scale construction and infrastructure growth."

 encourage_agricultural_industry:0 "Encourage Agricultural Industry"
 encourage_agricultural_industry_desc:0 "State support for agricultural development increases productivity and rural investment. Policies promote expansion of farming and food production."

 encourage_resource_industry:0 "Encourage Resource Industry"
 encourage_resource_industry_desc:0 "Focused efforts to expand resource extraction strengthen the industrial base. Governments promote mining, logging, and raw material production."

 ### ERA 3 ###

 new_world_crops:0 "New World Crops"
 new_world_crops_desc:0 "The introduction of crops from the Americas, such as maize and potatoes, greatly improves food supply. These crops increase yields and support rapid population growth."

 sugar_plantation:0 "Sugar Plantations"
 sugar_plantation_desc:0 "The cultivation of sugar becomes a highly profitable enterprise in colonial regions. Plantation systems drive economic expansion but often rely on exploitative labor systems."

 cotton_plantation:0 "Cotton Plantations"
 cotton_plantation_desc:0 "The large-scale cultivation of cotton fuels textile industries. Cotton plantations become central to both global trade and industrial growth."

 tobacco_plantation:0 "Tobacco Plantations"
 tobacco_plantation_desc:0 "The production of tobacco creates a valuable cash crop for international trade. Plantations generate wealth while shaping colonial economies."

 faceting:0 "Gem Faceting"
 faceting_desc:0 "The cutting and polishing of gemstones increases their value and desirability. Skilled craftsmanship turns raw gems into luxury goods for elite markets."

 refined_saiger_process:0 "Refined Saiger Process"
 refined_saiger_process_desc:0 "Advanced metallurgical techniques improve the separation and refinement of metals such as silver from lead. This increases efficiency and profitability in mining operations."

 standardized_planks_and_bricks:0 "Standardized Materials"
 standardized_planks_and_bricks_desc:0 "The mass production of uniform building materials improves construction speed and efficiency. Standardization supports urban expansion and infrastructure development."

 patio_process:0 "Patio Process"
 patio_process_desc:0 "A chemical process for extracting silver using mercury revolutionizes precious metal production. It greatly increases output and supports expanding global trade."

 expanded_iron_mining:0 "Expanded Iron Mining"
 expanded_iron_mining_desc:0 "Improved mining techniques increase iron extraction, supporting growing industrial demand. Iron becomes a critical material for tools, construction, and military use."

 expanded_logging:0 "Expanded Logging"
 expanded_logging_desc:0 "More efficient logging operations increase timber supply. Expanded logging supports construction, shipbuilding, and industrial growth."

 potatoes:0 "Potato Cultivation"
 potatoes_desc:0 "The widespread adoption of potatoes provides a highly efficient and resilient food source. This crop supports population growth and improves food security."

 apprenticeship_system:0 "Apprenticeship System"
 apprenticeship_system_desc:0 "Structured training systems pass skills from masters to apprentices, ensuring a steady supply of skilled labor. This strengthens industrial productivity and craftsmanship."