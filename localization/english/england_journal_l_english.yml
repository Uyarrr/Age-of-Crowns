 rise_of_great_britain: "Rise of Great Britain"

 je_england_1: "The Hundred Years War"
 je_england_1_reason: "For more than a century, the kings of England have claimed the throne of France. Though fortunes have risen and fallen, the struggle for the French Crown remains unfinished. Whether through conquest, diplomacy, or sheer determination, England must decide the fate of its continental ambitions and secure its place among the great powers of Europe." 
 je_england_2: "The Wars of the Roses"
 je_england_2_reason: "The #b Succession Bar#! drifts between the Lancastrian court and the Yorkist affinity. High [concept_legitimacy], a powerful Crown, and landed magnates strengthen Lancaster; military discontent, administrative reformers, and defeat in France strengthen York. The #b Realm Tension Bar#! rises when legitimacy is low or one faction becomes too dominant.\n\nThe conclusion of the French wars has left deep scars upon the kingdom. Rival noble houses compete for influence, the authority of the Crown is tested, and the realm stands at a crossroads. England must restore stability before internal divisions tear the kingdom apart."
 je_england_3: "Unification of Britain"
 je_england_3_reason: "The British Isles remain divided among rival kingdoms, lordships, and clans. To secure the future of England and establish unquestioned dominance over the region, the Crown must bring the Isles under a single authority and lay the foundations for a united British state."
