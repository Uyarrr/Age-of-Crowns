 england_hyw_victory.title: "The Angevin Triumph"
 england_hyw_victory.desc: "Against all expectation, the English Crown has restored its power across France. What began as a fading dynastic claim has become a living political reality, and nobles on both sides of the Channel now look to England as the arbiter of the French realm."
 england_hyw_victory.flavor: "The old claim has not merely survived — it has been vindicated. From London to Paris, the victory is proclaimed as proof that the Crown was destined to rule on both shores of the Channel."
 england_hyw_victory.a: "The dream of our forefathers is restored"
 hundred_years_war_won: "The Angevin Triumph"

 england_hyw_defeat.title: "The Loss of France"
 england_hyw_defeat.desc: "The last hopes of an English dominion in France have collapsed. Decades of war, taxation, and noble sacrifice have ended not in triumph, but in retreat. The authority of the Crown is wounded, and those who bled for the French claim now question the judgment of the throne."
 england_hyw_defeat.flavor: "With the continental dream shattered, England must turn inward. Yet peace brings no certainty, for the defeat has left behind debts, grievances, and ambitious nobles eager to exploit the weakness of the Crown."
 england_hyw_defeat.a: "England must endure the shame."
 hundred_years_war_lost: "The Loss of France"

 england_new_world_canada.title: "The Northern Dominion"
 england_new_world_canada.desc: "Reports brought back by fishermen, merchants, and daring explorers speak of a vast northern land beyond the Atlantic. Rich forests stretch to the horizon, rivers teem with fish, and untapped resources await those bold enough to claim them. While rival powers look south toward gold and conquest, many within the Crown argue that Britain's future may lie in these colder shores."
 england_new_world_canada.flavor: "The opportunity to establish a lasting presence in the northern reaches of the New World has captured the imagination of nobles, merchants, and adventurers alike."
 england_new_world_canada.a: "The northern lands shall be ours"
 england_new_world_canada.b: "We are not interested"
 canada_expedition: "Canada Expedition"

 england_the_justices_of_peace.title: "The Justices of the Peace"
 england_the_justices_of_peace.desc: "The Crown increasingly relies upon Justices of the Peace to administer local affairs, uphold order, and enforce royal authority throughout the kingdom."
 england_the_justices_of_peace.flavor: "As the realm grows more populous and complex, the maintenance of law and order can no longer depend solely upon the authority of great lords. Across England, Justices of the Peace have become indispensable servants of the Crown, overseeing local administration, settling disputes, and enforcing the King's laws. Recent reforms have sought to improve their conduct and accountability, requiring greater scrutiny of their duties and allowing complaints against them to be brought directly before royal authorities. Supporters argue that these measures strengthen justice and reinforce royal authority in the shires, while critics contend that they undermine the traditional privileges of local noblemen. The question now before the Crown is whether these officials should continue to play an expanding role in the governance of England."
 england_the_justices_of_peace.a: "Yes, we need them"
 england_the_justices_of_peace.b: "No, that is the Noblemen's job"
 england_the_justices_of_peace_a: "Yes, we need them"
 england_the_justices_of_peace_b: "Yes, we need them"

 england_the_yorkist_tradition.title: "The Yorkist Tradition"
 england_the_yorkist_tradition.desc: "Promoting government officers from the middle class, particularly clerics, lawyers, and educated administrators, has long been a Yorkist tradition. As the responsibilities of the Crown continue to expand, many now look to us for guidance on whether this policy shall endure."
 england_the_yorkist_tradition.flavor: "The administration of England has grown increasingly complex. Royal courts demand learned judges, taxes require diligent clerks, and the King's authority must be enforced throughout the realm by capable officials. For decades, the Crown has relied upon educated men drawn from the clergy, the legal profession, and the emerging middle classes, valuing competence and loyalty above noble birth. Yet many among the aristocracy resent this practice, viewing it as an erosion of their ancient privileges and rightful place within the government. As the kingdom's administrative needs continue to grow, both the nobility and the educated classes await our decision. Shall service to the Crown be determined by merit and learning, or reserved for those of noble blood?"
 england_the_yorkist_tradition.a: "Yes, we need their talents"
 england_the_yorkist_tradition.b: "Office belongs to the Nobility"
 england_the_yorkist_tradition_a: "Yorkist Administrators"
 england_the_yorkist_tradition_b: "Hereditary Officeholders"

 england_war_of_the_roses_start.title: "The Cousins' Quarrel"
 england_war_of_the_roses_start.desc: "The weakness of royal authority has emboldened the great houses of England. The Lancastrian court claims loyalty by right of possession, while the House of York gathers those who believe the realm requires firmer hands and cleaner government."
 england_war_of_the_roses_start.flavor: "In the halls of Westminster, every oath has begun to sound like a question. Men who once feasted together now count retainers, weigh marriages, and ask which banner would shelter them if the king's peace failed."
 england_war_of_the_roses_start.a: "A rose by any other name may still draw blood."

 england_war_of_the_roses_lancaster.title: "Lancaster Secure"
 england_war_of_the_roses_lancaster.desc: "The Lancastrian order has survived the challenge of its rivals. By binding the magnates to the Crown and restoring the dignity of royal government, England has drawn the teeth from the Yorkist cause."
 england_war_of_the_roses_lancaster.flavor: "The lords came one by one, some smiling, some silent, all kneeling. The kingdom had not forgotten its wounds, but for the first time in years the court dared to call them closed."
 england_war_of_the_roses_lancaster.a: "The red rose endures."

 england_war_of_the_roses_york.title: "The Sun in Splendour"
 england_war_of_the_roses_york.desc: "The Yorkist affinity has prevailed over the old Lancastrian court. With the backing of soldiers, administrators, and nobles weary of misrule, England turns toward a more disciplined monarchy."
 england_war_of_the_roses_york.flavor: "At dawn the banners were raised above London, white rose and bright sun catching the same pale light. Those who had waited in uncertainty now hurried to declare that they had never doubted."
 england_war_of_the_roses_york.a: "The white rose rises."
 england_war_of_the_roses_realm_arms.title: "The Realm Arms Itself"
 england_war_of_the_roses_realm_arms.desc: "Retainers gather beneath private badges, sheriffs hesitate to enforce royal writs, and the great houses measure one another openly. Unless the Crown can impose a settlement, faction may soon become civil war."
 england_war_of_the_roses_realm_arms.flavor: "Every road out of London seems to carry messengers, liveried men, and rumor. In the shires, old quarrels have found new banners."
 england_war_of_the_roses_realm_arms.a: "Summon the lords to council."
 england_war_of_the_roses_realm_arms.b: "Let loyal affinities prepare."
 england_war_of_the_roses_cade.title: "The Commons of Kent"
 england_war_of_the_roses_cade.desc: "Discontent in Kent has crystallized around demands for lawful government, honest officials, and relief from the failures of royal policy. Though the rising speaks in the name of reform, many at court hear the voice of York behind it."
 england_war_of_the_roses_cade.flavor: "Petitions arrive by the handful, written with the confidence of men who believe the kingdom has forgotten them and with the anger of men willing to remind it."
 england_war_of_the_roses_cade.a: "Hear their complaints."
 england_war_of_the_roses_cade.b: "Break the disorder."
 england_war_of_the_roses_protectorate.title: "The Duke's Protectorate"
 england_war_of_the_roses_protectorate.desc: "The Duke of York and his allies press for a protectorate over the realm, claiming that only firm and reforming authority can restore order while the Crown falters. To accept would steady the kingdom at the cost of Lancastrian prestige; to refuse may force every lord to choose a side."
 england_war_of_the_roses_protectorate.flavor: "The request is phrased as service, the ceremony as loyalty, and the implication as plain as a drawn blade."
 england_war_of_the_roses_protectorate.a: "Name York Protector."
 england_war_of_the_roses_protectorate.b: "The Crown needs no protector."
 england_war_of_the_roses_livery.title: "Livery and Maintenance"
 england_war_of_the_roses_livery.desc: "Across the shires, magnates distribute badges, retain armed households, and bind lesser gentry into private affinities. These liveried men claim to defend order, but every household troop makes the King's peace look more fragile."
 england_war_of_the_roses_livery.flavor: "A badge sewn onto a sleeve may be called loyalty. A hundred such sleeves gathered in a market town are something else."
 england_war_of_the_roses_livery.a: "Restrict private livery."
 england_war_of_the_roses_livery.b: "The great lords must keep their men."
 england_war_of_the_roses_queen_party.title: "The Queen's Party"
 england_war_of_the_roses_queen_party.desc: "A circle of Lancastrian loyalists gathers around the Queen, arguing that the Crown must reward those who stand firm against Yorkist ambition. Their enemies see not loyalty, but exclusion, favoritism, and the hardening of court politics."
 england_war_of_the_roses_queen_party.flavor: "The court speaks in careful voices, but everyone knows which doors open for which names."
 england_war_of_the_roses_queen_party.a: "Trust the Queen's allies."
 england_war_of_the_roses_queen_party.b: "Broaden the King's council."
 england_war_of_the_roses_warwick.title: "The Earl of Warwick"
 england_war_of_the_roses_warwick.desc: "Richard Neville, Earl of Warwick, commands wealth, ships, retainers, and a talent for binding men to his cause. Yorkist reformers court him eagerly, while the court fears that such a lord may become too powerful to manage."
 england_war_of_the_roses_warwick.flavor: "Some lords bring counsel to court. Warwick brings ships, retainers, and enough friends to make every counsel sound like a summons."
 england_war_of_the_roses_warwick.a: "Win Warwick's support."
 england_war_of_the_roses_warwick.b: "Check his ambition."
 england_war_of_the_roses_st_albans.title: "First Blood at St Albans"
 england_war_of_the_roses_st_albans.desc: "The quarrel has spilled into armed confrontation. Blood in the streets has transformed grievance into vengeance, and every noble house now studies the lesson: the King's peace can be broken."
 england_war_of_the_roses_st_albans.flavor: "No herald proclaimed the end of peace. It ended in shouting, smoke, and men recognizing their neighbors beneath enemy badges."
 england_war_of_the_roses_st_albans.a: "Accept York's demands for reform."
 england_war_of_the_roses_st_albans.b: "Attaint the rebels."
 england_war_of_the_roses_loveday.title: "The Loveday"
 england_war_of_the_roses_loveday.desc: "The Crown proposes a public reconciliation between the rival lords. A solemn procession, compensation for the dead, and oaths sworn before God may still persuade the kingdom that peace is possible."
 england_war_of_the_roses_loveday.flavor: "Hand in hand, enemies walk through London while the crowd tries to decide whether it is witnessing mercy or theater."
 england_war_of_the_roses_loveday.a: "Stage the reconciliation."
 england_war_of_the_roses_loveday.b: "Empty ceremony will not bind them."
 england_war_of_the_roses_attainders.title: "Bills of Attainder"
 england_war_of_the_roses_attainders.desc: "Parliament may be used to strip the Crown's enemies of lands, offices, and inheritance. Such punishment would strengthen the victorious faction, but every attainder teaches the defeated that compromise offers no safety."
 england_war_of_the_roses_attainders.flavor: "Ink can confiscate what swords have not yet taken."
 england_war_of_the_roses_attainders.a: "Make treason costly."
 england_war_of_the_roses_attainders.b: "Offer pardons instead."
