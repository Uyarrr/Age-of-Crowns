l_english:
 hundred_years_war_won: "The Angevin Triumph"
 hundred_years_war_won_desc: "The English Crown has emerged victorious from its centuries-long struggle for France. The prestige of the monarchy has reached unprecedented heights, while the nobility rally behind a ruler whose claim has been vindicated through conquest and diplomacy alike. Though the challenges of governing a vast trans-Channel realm remain, the triumph has strengthened royal authority and secured England's place among the foremost powers of Europe."

 hundred_years_war_lost: "The Loss of France"
 hundred_years_war_lost_desc: "The dream of an Anglo-French monarchy has come to an end. England's continental possessions have been lost, and with them much of the prestige and legitimacy once derived from the French claim. Noble confidence in the Crown has been shaken, political divisions deepen, and the authority of the monarchy faces growing challenges at home. The war is over, but its consequences will shape the kingdom for generations."

 rise_of_great_britain: "Rise of Great Britain"
 rise_of_great_britain_desc: "The British Isles stand united beneath a single authority. Centuries of rivalry, conquest, and diplomacy have forged a stronger kingdom whose influence reaches far beyond its shores. The emergence of Great Britain marks the beginning of a new era of prosperity, ambition, and power."

 je_england_1: "The Hundred Years War"
 je_england_1_reason: "For more than a century, the kings of England have claimed the throne of France. Though fortunes have risen and fallen, the struggle for the French Crown remains unfinished. Whether through conquest, diplomacy, or sheer determination, England must decide the fate of its continental ambitions and secure its place among the great powers of Europe." 
 je_england_2: "The Wars of the Roses"
 je_england_2_reason: "The conclusion of the French wars has left deep scars upon the kingdom. Rival noble houses compete for influence, the authority of the Crown is tested, and the realm stands at a crossroads. England must restore stability, strengthen royal authority, and prevent internal divisions from tearing the kingdom apart."
 je_england_3: "Unification of Britain"
 je_england_3_reason: "The British Isles remain divided among rival kingdoms, lordships, and clans. To secure the future of England and establish unquestioned dominance over the region, the Crown must bring the Isles under a single authority and lay the foundations for a united British state."

 england_hyw_victory_title: "The Angevin Triumph"
 england_hyw_victory_desc: "Against all expectation, the English Crown has restored its power across France. What began as a fading dynastic claim has become a living political reality, and nobles on both sides of the Channel now look to England as the arbiter of the French realm."
 england_hyw_victory_flavor: "The old claim has not merely survived — it has been vindicated. From London to Paris, the victory is proclaimed as proof that the Crown was destined to rule on both shores of the Channel."
 england_hyw_victory_option: "The dream of our forefathers is restored."

 england_hyw_defeat_title: "The Loss of France"
 england_hyw_defeat_desc: "The last hopes of an English dominion in France have collapsed. Decades of war, taxation, and noble sacrifice have ended not in triumph, but in retreat. The authority of the Crown is wounded, and those who bled for the French claim now question the judgment of the throne."
 england_hyw_defeat_flavor: "With the continental dream shattered, England must turn inward. Yet peace brings no certainty, for the defeat has left behind debts, grievances, and ambitious nobles eager to exploit the weakness of the Crown."
 england_hyw_defeat_option: "England must endure the shame."

england_new_world_canada.title: "The Northern Dominion"
england_new_world_canada.desc: "Reports brought back by fishermen, merchants, and daring explorers speak of a vast northern land beyond the Atlantic. Rich forests stretch to the horizon, rivers teem with fish, and untapped resources await those bold enough to claim them. While rival powers look south toward gold and conquest, many within the Crown argue that Britain's future may lie in these colder shores. The opportunity to establish a lasting presence in the northern reaches of the New World has captured the imagination of nobles, merchants, and adventurers alike."
england_new_world_canada.a: "The northern lands shall be ours."

england_the_justices_of_peace_title: The Justices of Peace
england_the_justices_of_peace_desc: The position of Justice of the Peace originated in England in about the 12th Century, believed to be from a Royal Edict issued by King Richard I and the Archbishop of Canterbury in the year 1195. The title was first known as Custodes Pacis, but was later changed to Justices of the Peace. An act concerning Justices of the Peace was passed in 1489. It required that justices devote part of every quarter session to acknowledgment of the areas in which they themselves are particularly weak. The same act provided the general populace with the right to complain about the actions of justices directly to the monarch or his council. The appointment of the justices by the Lord Chancellor at irregular annual intervals allowed for the possible removal of uncooperative gentlemen at the next annual re-issue of the commissions.
england_the_justices_of_peace.a: Yes, we need them
england_the_justices_of_peace.b: No, that is the Noblemen's job
	flavor = england_the_justices_of_peace_flavor