england_inns_of_court.title: "The Inns of Court"
england_inns_of_court.desc: "The Inns of Court continue to attract ambitious young men seeking careers in law, administration, and royal service. Their graduates increasingly occupy positions throughout the kingdom, providing the Crown with a growing pool of educated officials."
england_inns_of_court.flavor: "In generations past, the governance of England rested largely in the hands of noble households and local magnates. Yet as the responsibilities of the Crown have expanded, a new class of servant has emerged. Within the halls of the Inns of Court, aspiring lawyers study the laws of the realm, debate matters of governance, and prepare themselves for service in royal courts and administrations. Their influence now stretches across the kingdom, from county offices to the councils of the Crown itself. Supporters praise these institutions for cultivating capable and loyal officials, while critics argue that lawyers and clerks increasingly encroach upon the ancient privileges of England's nobility. As their influence continues to grow, the Crown must decide whether to encourage their expansion or preserve the traditional order."
england_inns_of_court.yes: "The realm needs learned men"
england_inns_of_court.no: "Office belongs to the Nobility"
england_inns_of_court_yes: "Educated Administrators"
england_inns_of_court_no: "Aristocratic Governance"

england_new_world_atlantic_coast.title: "The Colonial Frontier"
england_new_world_atlantic_coast.desc: "Reports from across the Atlantic speak of fertile lands, sheltered harbors, and vast opportunities for settlement along the eastern coast of North America."
england_new_world_atlantic_coast.flavor: "What began as seasonal voyages by fishermen and explorers has revealed the immense potential of the Atlantic coast. From the rocky shores of the north to the temperate lands farther south, the coastline offers abundant resources, valuable trade opportunities, and favorable locations for permanent settlements. Merchants envision profitable enterprises, adventurers seek fortune and land, and statesmen speak of extending the Crown's influence across the ocean. Yet such ambitions demand ships, supplies, and considerable expense. The question before us is whether England shall commit itself to the establishment of new settlements upon this distant frontier."
england_new_world_atlantic_coast.a: "Claim the Atlantic Coast"
england_new_world_atlantic_coast.b: "The venture is too costly"
atlantic_coast_expedition: "Atlantic Coast Expedition"

england_the_enclosure_movement.title: "The Enclosure Movement"
england_the_enclosure_movement.desc: "The enclosure of common lands has transformed England's countryside, driving agricultural reform, urban growth, and overseas migration."
england_the_enclosure_movement.flavor: "For centuries, England's villages had been bound together by fields held in common, where generations of tenant farmers lived and worked beneath the old manorial order. Yet as trade enriched the realm and wool commanded ever greater prices, many landowners enclosed these shared lands behind hedges and fences, replacing tradition with profit. Thousands found themselves without a livelihood and departed for England's growing towns, where workshops, mines, and manufactories eagerly consumed an endless supply of labor. Others looked beyond the horizon, crossing the Atlantic in hopes that the New World might offer the opportunity denied to them at home. The transformation reshaped not only the English countryside, but the destiny of the kingdom itself."
england_the_enclosure_movement.a: "Reform"
england_the_enclosure_movement.b: "Do not reform"
england_the_enclosure_movement_a: "Enclosed Estates"
england_the_enclosure_movement_b: "Protected Commons"

order_of_chivalry.title: "Order of Chivalry"
order_of_chivalry.desc: "Inspired by the traditions of the Crusades and the ideals of chivalry, a royal order may be established to honor distinguished service and embody the highest virtues of the realm."
order_of_chivalry.flavor: "The first military orders were forged amid the turmoil of the Crusades, where faith, courage, and discipline bound warriors into brotherhoods that endured long after the battles had ended. In the centuries since, rulers and noble houses across Christendom have embraced these traditions, founding orders of chivalry to recognize loyalty, valor, and distinguished service. Their banners have become symbols of honor, their insignia marks of prestige, and their membership the aspiration of the realm's finest men. While some dismiss such institutions as relics of a fading age, others argue that the virtues they celebrate are timeless. By establishing an order under the patronage of our [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], we shall reward merit, strengthen the bonds between Crown and nobility, and ensure that the highest ideals of our nation endure for generations to come."
order_of_chivalry.a: "The dawn of a new order"
order_of_chivalry.b: "Such orders should stay in the past"
order_of_chivalry_a: "Order of Chivalry"
