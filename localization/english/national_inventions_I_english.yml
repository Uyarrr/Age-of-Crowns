#Denmark
 DEN_Oresundstolden:0 "Oresundstolden"
 DEN_Oresundstolden_desc:0 "From the 15th century onward, Denmark controlled the Øresund strait, extracting tolls from nearly all Baltic trade. This was one of the crown’s most important income sources and a cornerstone of Danish power."
 DEN_Kalmar_Legacy:0 "Kalmar Union"
 DEN_Kalmar_Legacy_desc:0 "The Kalmar Union (Denmark-Norway-Sweden) forced Denmark to develop unusually centralized royal administration and noble management for the period."
 DEN_Baltic_Convoy_System:0 "Baltic Convoy System"
 DEN_Baltic_Convoy_System_desc:0 "Denmark invested heavily in protecting Baltic shipping lanes, convoying grain, timber, iron, and naval supplies vital to European powers."
 DEN_Royal_Lutheran_Church_Ordinance:0 "Royal Lutheran Church Ordinance"
 DEN_Royal_Lutheran_Church_Ordinance_desc:0 "Denmark was one of the earliest adopters of Lutheranism (1536). Unlike many realms, the Reformation was not a chaotic bottom-up movement but a top-down royal project: monasteries were dissolved, church lands confiscated, and the king became head of the national church."
 DEN_Royal_Naval_Ordinance:0 "Royal Naval Ordinance"
 DEN_Royal_Naval_Ordinance_desc:0 "The Danish crown professionalized the navy earlier than many continental states, treating it as a permanent arm of royal power."
 DEN_Peasant_Emancipation_Acts:0 "Peasant Emancipation Acts"
 DEN_Peasant_Emancipation_Acts_desc:0 "Denmark abolished serfdom earlier and more peacefully than most of Europe, integrating peasants into a productive agrarian economy."