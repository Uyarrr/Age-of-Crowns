l_english:

 lawgroup_army_doctrine: "Army Doctrine"
 lawgroup_feudal_de_jure_laws: "Feudal 'De Jure' Laws"
 lawgroup_administrative_system: "Administrative System"

 law_offensive_stance: "Offensive Doctrine"
 law_offensive_stance_desc: "Victory is achieved through relentless aggression. Commanders favor bold advances, decisive engagements, and constant pressure to overwhelm the enemy before they can respond."

 law_defensive_stance: "Defensive Doctrine"
 law_defensive_stance_desc: "Endurance and discipline define this doctrine. Armies are trained to hold fortified positions, absorb enemy assaults, and deny ground at all costs, trading mobility for resilience."

 law_artillery_warfare: "Grand Batteries"
 law_artillery_warfare_desc: "Massed artillery formations dominate the battlefield, breaking enemy lines with thunderous volleys. Warfare revolves around firepower and coordination, though at great financial and logistical cost."

 law_infantry_warfare: "Pike and Shot Tradition"
 law_infantry_warfare_desc: "Infantry stands at the heart of the army, combining pikes and firearms in disciplined formations. These troops provide both offensive strength and defensive stability across all terrains."

 law_cavalry_warfare: "Mounted Warfare"
 law_cavalry_warfare_desc: "Speed and shock define this doctrine. Cavalry units strike swiftly, outmaneuvering enemies, exploiting weaknesses, and securing territory before resistance can form."

 law_by_tradition: "By Tradition"
 law_by_tradition_desc: "Authority is upheld through ancient custom, inherited obligations, and the accepted rights of the realm. Rule draws its strength from continuity and legitimacy, though such a system often resists central direction and reform."

 law_by_blood: "By Blood"
 law_by_blood_desc: "Authority flows first and foremost through bloodlines, dynastic right, and noble inheritance. This strengthens the personal power of the ruler and the landed elite, but ties the realm more closely to aristocratic privilege and factional ambition."

 law_autonomous_councils: "Autonomous Councils"
 law_autonomous_councils_desc: "Regional councils, noble assemblies, and local estates govern much of the realm in their own right. This strengthens local loyalties and eases the management of subjects, but weakens the direct authority of the crown."

 law_central_council: "Central Council"
 law_central_council_desc: "The affairs of the realm are directed through a strong central council acting in the name of the state. Administration becomes more efficient and military coordination improves, but subjects grow less content under tighter control."

 law_local_courts: "Local Courts"
 law_local_courts_desc: "Justice and administration are left largely in the hands of provincial magistrates, customary courts, and local authorities. This reduces political unrest and preserves regional customs, though it comes at the cost of bureaucratic efficiency."

 law_confederal_union: "Confederal Union"
 law_confederal_union_desc: "The state is organized as a loose union of semi-autonomous members bound together by common interests, privileges, and negotiated obligations. Such a system reduces subject discontent and strengthens diplomatic reach, but limits central authority."

 law_federal_state: "Federal State"
 law_federal_state_desc: "The realm is organized as a union of semi-autonomous states, each retaining its own customs, laws, and institutions. While regional authorities govern local affairs, all remain bound under a central federal government and its overarching rule."

 law_absolute_leadership: "Absolute Leadership"
 law_absolute_leadership_desc: "All meaningful authority is concentrated in the hands of the ruler, whose will overrides customary privilege, local autonomy, and competing centers of power. The state becomes more disciplined and ideologically coherent, but such domination breeds resentment among the realm's established interests."