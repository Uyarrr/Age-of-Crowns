# ARMY DOCTRINE #

 law_no_army_doctrine: "No Formal Doctrine"
 law_no_army_doctrine_desc: "The army lacks a unified doctrine, relying instead on tradition, local practices, and the judgment of individual commanders. While flexible, such forces lack the cohesion and efficiency of a formally organized military system."

 law_offensive_stance: "Offensive Doctrine"
 law_offensive_stance_desc: "Victory is achieved through relentless aggression. Commanders favor bold advances, decisive engagements, and constant pressure to overwhelm the enemy before they can respond."

 law_defensive_stance: "Defensive Doctrine"
 law_defensive_stance_desc: "Endurance and discipline define this doctrine. Armies are trained to hold fortified positions, absorb enemy assaults, and deny ground at all costs, trading mobility for resilience."

 law_artillery_warfare: "Grand Batteries"
 law_artillery_warfare_desc: "Massed artillery formations dominate the battlefield, breaking enemy lines with thunderous volleys. Warfare revolves around firepower and coordination, though at great financial and logistical cost."

 law_infantry_warfare: "Pike and Shot Tradition"
 law_infantry_warfare_desc: "Infantry stands at the heart of the army, combining pikes and firearms in disciplined formations. These troops provide both offensive strength and defensive stability across all terrains."

 law_cavalry_warfare: "Mounted Warfare"
 law_cavalry_warfare_desc: "Speed and shock define this doctrine. Cavalry units strike swiftly, outmaneuvering enemies, exploiting weaknesses, and securing territory before resistance can form."

# FEUDAL DE JURE LAW #

 law_by_tradition: "By Tradition"
 law_by_tradition_desc: "Authority is upheld through ancient custom, inherited obligations, and the accepted rights of the realm. Rule draws its strength from continuity and legitimacy, though such a system often resists central direction and reform."

 law_by_blood: "By Blood"
 law_by_blood_desc: "Authority flows first and foremost through bloodlines, dynastic right, and noble inheritance. This strengthens the personal power of the ruler and the landed elite, but ties the realm more closely to aristocratic privilege and factional ambition."

# Administrative System #

 law_autonomous_councils: "Autonomous Councils"
 law_autonomous_councils_desc: "Regional councils, noble assemblies, and local estates govern much of the realm in their own right. This strengthens local loyalties and eases the management of subjects, but weakens the direct authority of the crown."

 law_central_council: "Central Council"
 law_central_council_desc: "The affairs of the realm are directed through a strong central council acting in the name of the state. Administration becomes more efficient and military coordination improves, but subjects grow less content under tighter control."

 law_local_courts: "Local Courts"
 law_local_courts_desc: "Justice and administration are left largely in the hands of provincial magistrates, customary courts, and local authorities. This reduces political unrest and preserves regional customs, though it comes at the cost of bureaucratic efficiency."

 law_confederal_union: "Confederal Union"
 law_confederal_union_desc: "The state is organized as a loose union of semi-autonomous members bound together by common interests, privileges, and negotiated obligations. Such a system reduces subject discontent and strengthens diplomatic reach, but limits central authority."

 law_federal_state: "Federal State"
 law_federal_state_desc: "The realm is organized as a union of semi-autonomous states, each retaining its own customs, laws, and institutions. While regional authorities govern local affairs, all remain bound under a central federal government and its overarching rule."

 law_absolute_leadership: "Absolute Leadership"
 law_absolute_leadership_desc: "All meaningful authority is concentrated in the hands of the ruler, whose will overrides customary privilege, local autonomy, and competing centers of power. The state becomes more disciplined and ideologically coherent, but such domination breeds resentment among the realm's established interests."

 law_unitary_administration: "Unitary Administration"
 law_unitary_administration_desc: "The state is governed as a single unified entity under the supreme authority of the central government. Provincial institutions hold little independent power, as administration, law, and policy are directed from the center to ensure cohesion and control."

# Noble Privileges #

 law_strengthen_the_nobility: "Strengthen Noble Privileges"
 law_strengthen_the_nobility_desc: "The nobility has long served as the backbone of the realm, providing leadership, military service, and local governance. By expanding their rights and privileges, we secure their loyalty and reinforce traditional order, though at the cost of centralized authority."

 law_curtail_the_nobility: "Curtail Noble Privileges"
 law_curtail_the_nobility_desc: "The influence of the nobility must be restrained if the state is to govern effectively. By reducing their privileges and limiting their authority, the crown strengthens central control, though at the risk of alienating powerful aristocratic interests."

 # Cultural Traditions #

 law_martial_society: "Martial Society"
 law_martial_society_desc: "The values of war and discipline shape every aspect of society, where honor is earned through battle and strength is the measure of status. Such a culture produces experienced warriors and favors conquest, but risks unrest and instability within the realm."

 law_civil_society: "Civil Society"
 law_civil_society_desc: "The state prioritizes order, governance, and civic life over warfare, fostering stable institutions and effective administration. While such a society strengthens internal cohesion and prosperity, it lacks the martial edge of more warlike cultures."

 # Levy Law #

law_inclusive_levy: "Inclusive Levies"
law_inclusive_levy_desc: "The state draws upon a broad base of its population for military service, incorporating diverse groups into its armies. While this strengthens cohesion and reduces unrest among subjects, it requires a more complex administrative apparatus to manage recruitment and logistics."

law_noble_levy: "Noble Levies"
law_noble_levy_desc: "Military service is the duty of the nobility, who raise and lead forces in the name of the crown. These levies are better trained and equipped, but reliance on aristocratic power weakens central authority and increases the influence of the landed elite."

law_peasant_levy: "Peasant Levies"
law_peasant_levy_desc: "The state mobilizes the peasantry en masse in times of war, fielding large but poorly trained armies. While cheap to maintain and vast in number, such forces lack discipline and experience, often suffering heavy losses in battle."

# Economic Policy #

law_no_economic_policy: "No Economic Policy"
law_no_economic_policy_desc: "The state takes no active role in shaping the economy. Production and trade are left to local customs, tradition, and circumstance, resulting in a fragmented and inefficient economic landscape."

law_lockean_proviso: "Lockean Proviso"
law_lockean_proviso_desc: "Land and resources may be claimed freely, so long as enough and as good is left for others. This encourages expansion and productivity while maintaining a minimal sense of fairness."

law_war_economy: "War Economy"
law_war_economy_desc: "The entire economy is directed toward sustaining warfare. Industry and resources are mobilized to supply the military, often at the expense of civilian needs."

law_economic_theory: "Economic Theory"
law_economic_theory_desc: "Emerging financial and economic ideas guide the state’s policies. Structured taxation, lending systems, and monetary control strengthen the economy and state finances."

law_agriculture_economy: "Agrarian Economy"
law_agriculture_economy_desc: "The economy is centered around agriculture and rural production. While ensuring food security and stability, it limits the growth of industry and urban development."

law_fishing_economy: "Maritime Economy"
law_fishing_economy_desc: "Fishing and naval activity form the backbone of the economy. Coastal industries thrive, and naval power is strengthened, but inland development suffers."

law_pirate_economy: "Privateering Economy"
law_pirate_economy_desc: "Wealth is acquired through raiding, smuggling, and exploitation. While highly profitable in the short term, it destabilizes lawful trade and invites retaliation from other nations."

# Foreign Cultural Law #

law_allow_foreign_rituals: "Allow Foreign Rituals"
law_allow_foreign_rituals_desc: "Foreign customs, languages, and traditions are permitted to flourish within the realm. This policy fosters tolerance and coexistence, improving relations between diverse populations at the cost of cultural unity."

law_integrate_foreign_traditions: "Integrate Foreign Traditions"
law_integrate_foreign_traditions_desc: "The state actively encourages the blending of foreign customs into the dominant culture. Over time, distinct identities are absorbed, creating a more unified but less diverse society."