l_english:

 ideology_aristocracy: "Aristocracy"
 ideology_aristocracy_desc: "This ideology upholds the dominance of noble elites, favoring traditional hierarchies, hereditary privilege, and a social order built upon lineage and landownership."

 ideology_plutocratic: "Plutocratic"
 ideology_plutocratic_desc: "This ideology believes wealth should determine influence, promoting governance by economic elites and prioritizing policies that protect capital and private enterprise."

 ideology_decentralization: "Decentralization"
 ideology_decentralization_desc: "This ideology advocates for local autonomy and distributed authority, favoring regional governance over centralized state control."

 ideology_centralization: "Centralization"
 ideology_centralization_desc: "This ideology seeks to consolidate power within the state, emphasizing strong central authority, unified administration, and reduced regional independence."

 ideology_serfdom: "Serfdom"
 ideology_serfdom_desc: "This ideology supports a rigid agrarian hierarchy where peasants are bound to the land, ensuring stability through tradition and obligation."

 ideology_free_subjects: "Free Subjects"
 ideology_free_subjects_desc: "This ideology promotes personal freedom and mobility, rejecting forced labor systems and encouraging independent land ownership."

 ideology_traditionalist: "Traditionalist"
 ideology_traditionalist_desc: "This ideology defends long-standing customs, religious authority, and social continuity, resisting rapid or radical change."

 ideology_innovative: "Innovative"
 ideology_innovative_desc: "This ideology embraces progress, new ideas, and technological advancement, seeking to reshape society through innovation."

 ideology_liberalism: "Liberalism"
 ideology_liberalism_desc: "This ideology champions individual rights, political representation, and civil liberties, advocating for a more open and participatory society."

 ideology_absolutism: "Absolutism"
 ideology_absolutism_desc: "This ideology concentrates power in the hands of a single ruler, prioritizing authority, order, and the supremacy of the state above all."

 ideology_outward: "Expansionist"
 ideology_outward_desc: "This ideology encourages outward ambition through conquest, colonization, and military strength, seeking influence beyond its borders."

 ideology_inward: "Isolationist"
 ideology_inward_desc: "This ideology prioritizes internal stability and self-sufficiency, avoiding foreign entanglements and limiting external expansion."

 ideology_capital_economy: "Capital Economy"
 ideology_capital_economy_desc: "This ideology promotes free markets, private enterprise, and economic growth driven by investment and commerce."

 ideology_traditional_economy: "Traditional Economy"
 ideology_traditional_economy_desc: "This ideology favors agrarian production and established economic practices, resisting rapid industrial or financial transformation."

 ideology_spiritualist: "Spiritualist"
 ideology_spiritualist_desc: "This ideology places religion at the center of society, advocating strong ties between faith, governance, and daily life."

 ideology_humanist: "Humanist"
 ideology_humanist_desc: "This ideology promotes secular governance, intellectual freedom, and the reduction of religious influence in public affairs."

 ideology_quality: "Military Quality"
 ideology_quality_desc: "This ideology values professional armies, advanced tactics, and highly trained forces over sheer numbers."

 ideology_quantity: "Military Quantity"
 ideology_quantity_desc: "This ideology emphasizes mass mobilization, favoring large armies and widespread conscription over elite forces."

 ideology_individualism: "Individualism"
 ideology_individualism_desc: "This ideology prioritizes personal freedom, self-determination, and the rights of the individual over collective structures."

 ideology_communalism: "Communalism"
 ideology_communalism_desc: "This ideology values collective organization and shared responsibility, emphasizing the needs of the community over the individual."

 ideology_royalist: "Royalist"
 ideology_royalist_desc: "This ideology supports hereditary monarchy and the divine or traditional right of rulers to govern."

 ideology_republican: "Republican"
 ideology_republican_desc: "This ideology rejects monarchy, advocating for governance through elected representatives and civic institutions."

 ideology_slaver: "Pro-Slavery"
 ideology_slaver_desc: "This ideology supports the institution of slavery as an economic and social foundation, maintaining systems of forced labor."

 ideology_abolitionist: "Abolitionist"
 ideology_abolitionist_desc: "This ideology opposes slavery in all forms, advocating for its immediate or gradual abolition and the recognition of universal freedom."