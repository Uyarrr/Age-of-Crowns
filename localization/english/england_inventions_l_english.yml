l_english:

# AGE OF TRADITIONS

england_production_1: "Wool Staple System"
england_production_1_desc: "For centuries, England's prosperity has rested upon wool. By regulating its trade and concentrating production through established markets, the Crown ensures that English fleece remains the foundation of national wealth."

england_military_1: "Yeoman Longbow Tradition"
england_military_1_desc: "The longbow is more than a weapon; it is a symbol of English warfare. Generations of yeomen trained from youth have forged a military tradition capable of devastating enemy formations from afar."

england_society_1: "Cinque Ports"
england_society_1_desc: "A privileged network of coastal towns bound to the service of the Crown. Their ships, sailors, and maritime expertise provide England with a dependable foundation for naval power."

# AGE OF RENAISSANCE

england_production_2: "Royal Dockyards"
england_production_2_desc: "Under royal patronage, England's shipyards evolve into centers of organization, craftsmanship, and naval production. Standardized construction methods allow fleets to be built and maintained on an unprecedented scale."

england_military_2: "Wooden Wall"
england_military_2_desc: "England's security rests not upon stone fortresses, but upon her fleets. The warships of the Royal Navy form a wooden barrier around the realm, protecting trade and deterring invasion."

england_society_2: "English Renaissance"
england_society_2_desc: "New ideas in literature, science, and philosophy flourish throughout the kingdom. Scholars, playwrights, and thinkers reshape English culture, ushering in an age of intellectual achievement."

# AGE OF DISCOVERY

england_production_3: "Merchant Adventurers"
england_production_3_desc: "Organized companies of merchants venture into distant markets in pursuit of profit. Their voyages expand England's commercial reach and strengthen its position within global trade."

england_military_3: "Oceanic Warfare Doctrine"
england_military_3_desc: "Control of the seas requires more than ships alone. New naval doctrines emphasize commerce raiding, blockades, and the projection of power across the world's oceans."

england_society_3: "Secretaries of State"
england_society_3_desc: "As the realm's interests expand abroad, government administration grows increasingly sophisticated. Dedicated ministers coordinate diplomacy, intelligence, and affairs of state."

# AGE OF REFORMATION

england_production_4: "Enclosure Movement"
england_production_4_desc: "Open fields and communal farming give way to enclosed estates. Agricultural production becomes more efficient, though not without profound consequences for rural society."

england_military_4: "Professional Gunnery"
england_military_4_desc: "The growing importance of firearms demands trained specialists. Standardized drills and dedicated instruction transform gunnery from an art into a profession."

england_society_4: "English Parliament"
england_society_4_desc: "The governance of England increasingly depends upon consultation between Crown and Parliament. This evolving balance of authority shapes the kingdom's political development for centuries to come."

# AGE OF ABSOLUTISM

england_production_5: "Coke Smelting"
england_production_5_desc: "The substitution of coke for charcoal revolutionizes metalworking. Greater quantities of iron and steel can be produced, laying the foundations for industrial expansion."

england_military_5: "The Sick and Hurt Board"
england_military_5_desc: "A modern navy requires more than ships and cannon. Organized systems for treating wounded sailors and supplying fleets improve the efficiency and endurance of naval operations."

england_society_5: "Palladian Architecture"
england_society_5_desc: "Inspired by the principles of classical antiquity, Palladian architecture emphasizes order, symmetry, and grandeur. Its influence transforms estates, institutions, and cities alike."

# AGE OF REVOLUTIONS

england_production_6: "Water Frame"
england_production_6_desc: "Mechanized spinning harnesses the power of water to produce textiles on a scale previously unimaginable. Traditional cottage industries give way to industrial manufacture."

england_military_6: "Rulers of the Waves"
england_military_6_desc: "Through unrivaled naval experience, disciplined crews, and global reach, Britain secures command of the seas and safeguards its interests across the world."

england_society_6: "Redcoats"
england_society_6_desc: "Recognizable across continents, Britain's professional soldiers embody discipline, training, and military tradition. Their reputation becomes synonymous with the power of the British state."

pm_building_port_england: "Cinque Ports"