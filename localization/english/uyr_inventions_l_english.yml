l_english:
 nation_trait_1: "Age of Traditions"
 nation_trait_2: "Age of Renaissance"
 nation_trait_3: "Age of Discovery"
 nation_trait_4: "Age of Reformation"
 nation_trait_5: "Age of Absolutism"
 nation_trait_6: "Age of Revolutions"

 nation_trait_1_desc: "An era defined by long-standing customs, feudal obligations, and deeply rooted social hierarchies. Tradition shapes governance, and change comes slowly."
 nation_trait_2_desc: "A revival of art, science, and philosophy spreads across the world, encouraging innovation, cultural development, and new ways of thinking."
 nation_trait_3_desc: "Driven by curiosity and ambition, nations expand beyond their borders, establishing new trade routes and uncovering distant lands."
 nation_trait_4_desc: "Religious upheaval reshapes societies, as competing doctrines challenge established authority and redefine faith across nations."
 nation_trait_5_desc: "Power consolidates in the hands of centralized states, as rulers strengthen their authority and expand bureaucratic control over their realms."
 nation_trait_6_desc: "An age of radical change, where old systems are challenged by new ideas, leading to political upheaval and the rise of modern ideologies."

 peasant_levy: "Peasant Levy"
 peasant_levy_desc: "The obligation of common folk to bear arms in times of war provides rulers with a large but poorly trained pool of manpower. Though lacking the discipline of professional troops, peasant levies allow early states to field armies quickly and defend their lands through sheer numbers."

 archer: "Archer"
 archer_desc: "The disciplined use of bows introduces a flexible and deadly form of ranged warfare. Training archers requires skill and coordination, but their ability to project force at distance reshapes battlefield tactics and defensive planning."

 defensive_army: "Defensive Army"
 defensive_army_desc: "A military doctrine centered on fortification, cohesion, and disciplined resistance strengthens an army's staying power in battle. Emphasizing prepared positions and organized defense allows rulers to better protect their lands against numerically superior or more aggressive foes."

 ranching:0 "Ranching"
 ranching_desc:0 "The domestication and systematic breeding of large animals reshape rural life. Horses raised for strength and endurance become indispensable for transport, agriculture, and war, enabling faster communication and more mobile armies."

 horsemen:0 "Horsemen"
 horsemen_desc:0 "Combining horsemanship with martial training produces fast, shock-capable troops. Mounted warriors dominate open terrain, extend strategic reach, and provide decisive advantages in reconnaissance, pursuit, and flanking maneuvers."

 standing_army:0 "Standing Army"
 standing_army_desc:0 "Maintaining permanent troops under direct state authority marks a major transformation in warfare. A standing army offers greater discipline, readiness, and central control than temporary levies, allowing rulers to project power more consistently both at home and abroad."

 shipbuilding:0 "Shipbuilding"
 shipbuilding_desc:0 "The organized construction of seagoing vessels lays the foundation for naval power and maritime trade. Dedicated shipyards, skilled carpenters, and standardized methods allow states to field fleets, protect coasts, and sustain longer voyages."

 navigation:0 "Navigation"
 navigation_desc:0 "Improved knowledge of winds, currents, coastlines, and celestial guidance makes seafaring more reliable and far-reaching. Better navigation allows sailors to travel farther with greater confidence, opening new routes for trade, warfare, and exploration."

 naval_traditions:0 "Naval Traditions"
 naval_traditions_desc:0 "Generations of accumulated seafaring practice shape a state's naval identity. Seamanship, command customs, and maritime discipline allow fleets to operate more effectively, increasing the scale and reliability of naval operations."

 cog:0 "Cog"
 cog_desc:0 "The cog represents a durable and practical medieval sailing vessel suited to both trade and war. Its broad hull, high sides, and cargo capacity make it ideal for transporting goods, troops, and supplies across coastal and northern waters."

 traditional_galley:0 "Traditional Galley"
 traditional_galley_desc:0 "Driven by oars as well as sail, the galley remains a formidable warship in enclosed seas and along coastlines. Its maneuverability and speed make it especially effective for raiding, escort duty, and close naval combat in the Mediterranean and similar waters."

 weapon_crafting:0 "Weapon Crafting"
 weapon_crafting_desc:0 "The systematic production of arms standardizes military equipment and improves battlefield coordination. Weapon crafting workshops transform raw metals and wood into swords, spears, bows, and armor, strengthening state-controlled warfare and sustaining professional forces."

 mandatory_training:0 "Mandatory Training"
 mandatory_training_desc:0 "Requiring military instruction for able-bodied men creates a broader pool of prepared soldiers. Even brief, standardized training improves mobilization, discipline, and battlefield cohesion, making mass service more effective in times of war."

 professional_army:0 "Professional Army"
 professional_army_desc:0 "The transition from feudal obligation to paid, permanent soldiers creates a more disciplined and dependable military force. Professional armies can drill regularly, maintain clearer chains of command, and serve as instruments of centralized state power."

 saltpeter_works:0 "Saltpeter Works"
 saltpeter_works_desc:0 "The organized production and refinement of saltpeter secures a vital ingredient for gunpowder. By establishing dedicated works and reliable supply chains, states can support the wider use of firearms, artillery, and explosive munitions."

 cannonry:0 "Cannonry"
 cannonry_desc:0 "The systematic use of gunpowder artillery transforms warfare and fortification design. Mastery of cannon construction, deployment, and siege tactics allows states to breach walls, dominate fortified positions, and redefine the balance between offense and defense."

 houfnice:0 "Houfnice"
 houfnice_desc:0 "Early field artillery designed for striking massed troops and fortifications gives armies a new source of battlefield shock. The houfnice, firing stone or iron shot with explosive force, helps bridge the gap between medieval siege engines and modern artillery."

 men_at_arms:0 "Men-at-Arms"
 men_at_arms_desc:0 "Well-equipped and professionally maintained soldiers form the backbone of organized warfare in the late medieval and early modern world. Better armored and more disciplined than levied infantry, men-at-arms provide dependable strength in both offensive and defensive operations."

 military_drill:0 "Military Drill"
 military_drill_desc:0 "Regular drilling turns armed men into coordinated formations capable of acting as a single body. Repetition of commands, maneuver practice, and standardized discipline improve battlefield performance, readiness, and the long-term quality of military forces."

 cavalrymen:0 "Cavalrymen"
 cavalrymen_desc:0 "Heavier and more specialized mounted troops bring speed, prestige, and shock power to the battlefield. Properly trained cavalrymen excel in charges, pursuit, and battlefield exploitation, making them a decisive arm for states that can afford to field them."

 pike_and_shot:0 "Pike and Shot"
 pike_and_shot_desc:0 "The combination of pikemen and firearms creates a balanced battlefield system capable of both resisting cavalry and delivering devastating volleys. By integrating melee and gunpowder troops into coordinated formations, armies gain greater tactical flexibility and morale impact."

 coastal_expansion:0 "Coastal Expansion"
 coastal_expansion_desc:0 "The systematic extension of coastal infrastructure and overseas ambition strengthens a state's maritime reach. Expanding ports, shore facilities, and seaborne logistics enables rulers to sustain trade, colonization, and naval projection along distant coasts."

 supply_lines:0 "Supply Lines"
 supply_lines_desc:0 "The regular movement of provisions, ammunition, and matériel becomes essential as armies and fleets grow in scale. Organized supply lines reduce operational strain, allowing states to sustain longer campaigns and support greater transport capacity across land and sea."

 domineering_influence:0 "Domineering Influence"
 domineering_influence_desc:0 "The deliberate use of military strength to intimidate rivals and command respect enhances a state's standing abroad. Visible power projection through armies, fleets, and displays of force turns military capacity into prestige, leverage, and diplomatic advantage."

 message_relays:0 "Message Relays"
 message_relays_desc:0 "Networks of couriers, relay posts, and organized dispatch routes greatly improve the speed of military communication. Faster transmission of orders allows armies to move more efficiently, coordinate distant formations, and respond more quickly to unfolding threats."

 electric_telegraph:0 "Electric Telegraph"
 electric_telegraph_desc:0 "The transmission of messages through electrical signals revolutionizes the speed of command and administration. Governments and generals can coordinate armies, respond to crises, and manage distant territories with an immediacy impossible in earlier ages."

 landing_craft:0 "Landing Craft"
 landing_craft_desc:0 "Specialized vessels designed to move troops and equipment directly onto hostile shores greatly improve amphibious operations. By reducing the hazards of disembarkation, landing craft allow naval powers to launch invasions with greater speed, coordination, and effectiveness."