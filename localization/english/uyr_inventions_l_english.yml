l_english:
 archer:0 "Archer"
 archer_desc:0 "The disciplined use of bows introduces a flexible and deadly form of ranged warfare. Training archers requires skill and coordination, but their ability to project force at distance reshapes battlefield tactics and defensive planning."
 horsemen:0 "Horsemen"
 horsemen_desc:0 "Combining horsemanship with martial training produces fast, shock-capable troops. Mounted warriors dominate open terrain, extend strategic reach, and provide decisive advantages in reconnaissance, pursuit, and flanking maneuvers."
 ranching:0 "Ranching"
 ranching_desc:0 "The domestication and systematic breeding of large animals reshape rural life. Horses raised for strength and endurance become indispensable for transport, agriculture, and war, enabling faster communication and more mobile armies."
 windmill:0 "Windmill"
 windmill_desc:0 "Harnessing wind power allows communities to mechanize grain processing and reduce reliance on manual labor. Windmills increase the efficiency of food production, stabilizing grain supplies and supporting larger populations and urban growth."
 serfs:0 "Serfs"
 serfs_desc:0 "The binding of rural laborers to the land establishes a stable, hereditary workforce. Through customary obligations and legal restriction of movement, agricultural production becomes predictable, while landholding elites secure control over both labor and surplus."
 quarrying:0 "Quarrying"
 quarrying_desc:0 "The systematic extraction of stone enables durable construction on a larger scale. Organized quarries supply material for fortifications, roads, and monumental architecture, strengthening both urban centers and defensive infrastructure."
 mining_laws:0 "Mining Laws"
 mining_laws_desc:0 "As mineral extraction expands, rulers formalize control over subterranean wealth. Legal frameworks define ownership, labor obligations, and taxation of mines, allowing states to regulate production, extract revenue, and assert authority over strategic resources."
 bronze_working:0 "Bronze Working"
 bronze_working_desc:0 "The deliberate alloying of copper with tin or lead enables the production of bronze—durable, castable, and reliable. Bronze tools, weapons, and fittings support early specialization of labor and long-distance trade networks essential to pre-iron economies."
 iron_working:0 "Iron Working"
 iron_working_desc:0 "The mastery of iron smelting marks a turning point in material culture. By extracting and refining iron ore with charcoal and early blast techniques, societies gain access to stronger tools, weapons, and construction materials, laying the foundation for large-scale industry and warfare."
 fine_metals_mining:0 "Fine-Metals Working"
 fine_metals_mining_desc:0 "Refined techniques in smelting and separation make it possible to isolate precious and volatile minerals. Gold becomes a medium of wealth and state finance, while sulfur finds use in metallurgy, medicine, and the early production of explosives."
 abacus:0 "Abacus"
 abacus_desc:0 "Simple calculating devices enable more reliable accounting and record-keeping. By improving numerical accuracy in trade and taxation, early states gain the administrative capacity necessary to standardize coinage and manage monetary flows."
 imperial_ambitions:0 "Imperial Ambitions"
 imperial_ambitions_desc:0 "The assertion of imperial authority elevates a state beyond regional rule. Through ceremony, conquest, and claims of universal legitimacy, rulers project power abroad and command recognition at home, transforming ambition itself into a source of prestige."
 province_governors:0 "Province Governors"
 province_governors_desc:0 "Delegating authority to appointed governors allows the state to extend effective rule over distant territories. Through local administration, taxation, and law enforcement, provinces are integrated more rapidly into the political and economic structure of the realm."
 metallurgy:0 "Metallurgy"
 metallurgy_desc:0 "Advances in metal processing transform raw ores into standardized tools and components. Controlled forging, smelting refinement, and workshop organization allow metals to be produced at scale, increasing productivity across agriculture, construction, and military supply."
 woodcutting:0 "Woodcutting"
 woodcutting_desc:0 "Organized felling and processing of timber transforms forests into a reliable economic resource. Standardized woodcutting practices supply construction, fuel, and craft industries, supporting settlement growth, infrastructure development, and early manufacturing."
 glassworks:0 "Glassworks"
 glassworks_desc:0 "The controlled melting of sand and minerals enables the production of glass for vessels, windows, and specialized tools. Glassworks improve urban life, expand trade in crafted goods, and support advances in administration, science, and architecture."
 furniture_workshop:0 "Furniture Workshop"
 furniture_workshop_desc:0 "Dedicated workshops for shaping wood into durable furnishings mark a shift from household craft to organized production. Furniture workshops supply homes, institutions, and elites alike, improving living standards while creating demand for skilled artisans and refined materials."
 weapon_crafting:0 "Weapon Crafting"
 weapon_crafting_desc:0 "The systematic production of arms standardizes military equipment and improves battlefield coordination. Weapon crafting workshops transform raw metals and wood into swords, spears, bows, and armor, strengthening state-controlled warfare and sustaining professional forces."
 pottery:0 "Pottery"
 pottery_desc:0 "The widespread use of fired clay vessels revolutionizes storage, transport, and daily life. Pottery supports food preservation, trade logistics, and urban sanitation, forming a foundational craft industry essential to settled societies."
 paper_mill:0 "Paper Mill"
 paper_mill_desc:0 "The manufacture of paper from fibers and pulp enables efficient record-keeping and information exchange. Paper mills support administration, education, and commerce, allowing states to expand bureaucracy, codify laws, and coordinate complex economies."
 cloth_workshop:0 "Cloth Workshop"
 cloth_workshop_desc:0 "Organized weaving and textile production transform raw fibers into standardized cloth. Cloth workshops supply clothing, furnishings, and trade goods, supporting urban growth, social stratification, and the expansion of domestic and international markets."
 cannonry:0 "Cannonry"
 cannonry_desc:0 "The systematic use of gunpowder artillery transforms warfare and fortification design. Mastery of cannon construction, deployment, and siege tactics allows states to breach walls, dominate fortified positions, and redefine the balance between offense and defense."
